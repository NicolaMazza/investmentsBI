name: "InvestmentsBI"
version: "0.1.1"
slug: "investmentsbi"
description: "Look-through allocation reporting for Ghostfolio portfolios"
arch: [amd64, aarch64]
init: false
ingress: true
ingress_port: 8000
panel_icon: mdi:chart-donut
panel_title: "InvestmentsBI"
options:
  postgres_host: ""
  postgres_port: 5432
  postgres_db: "ghostfolio"
  postgres_db_bi: "investments_bi"
  postgres_user_rw: "reporter_rw"
  postgres_password_rw: ""
  postgres_user_ro: "reporter_ro"
  postgres_password_ro: ""
  ghostfolio_owner_id: ""
  ghostfolio_account_id: ""
  base_currency: "EUR"
  snapshot_local_time: "00:00"
  log_level: "INFO"
schema:
  postgres_host: str
  postgres_port: port
  postgres_db: str
  postgres_db_bi: str
  postgres_user_rw: str
  postgres_password_rw: password
  postgres_user_ro: str
  postgres_password_ro: password
  ghostfolio_owner_id: str
  ghostfolio_account_id: str
  base_currency: str
  snapshot_local_time: str
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
